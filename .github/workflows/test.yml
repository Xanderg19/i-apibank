name: Docker Image CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U testuser"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Build Java
      run: mvn clean install -Dspring.profiles.active=test
    - name: Debug DB
      run: docker ps
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USER }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Set tag
      run:
          echo "TAG=${GITHUB_SHA}" >> $GITHUB_ENV
    - name: Build Docker Image (TAG)
      run: |
          docker build -t xanderg19/my-api:$TAG .
          docker tag xanderg19/my-api:$TAG xanderg19/my-api:latest
  docker-job:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Push Docker Images
      if: github.ref == 'refs/heads/main'
      run: |
        docker push xanderg19/my-api:$TAG
        docker push xanderg19/my-api:latest
  test-job:
    runs-on: ubuntu-latest
    needs: build
    steps:
        - name: Mostrar rama
          run: echo "Estoy en la rama $GITHUB_REF"

        - name: Test aprendiendo
          run: echo "pipeline funcionando"